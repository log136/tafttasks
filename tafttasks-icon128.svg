<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000"/>
      <stop offset="100%" style="stop-color:#6b0000"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="128" height="64" rx="28" fill="url(#shine)"/>

  <!-- Checklist lines -->
  <!-- Row 1 - checked -->
  <rect x="38" y="36" width="14" height="14" rx="4" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <rect x="38" y="36" width="14" height="14" rx="4" fill="white" opacity="0.95"/>
  <!-- Checkmark -->
  <polyline points="41,43 44,46 51,40" fill="none" stroke="#8B0000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line -->
  <rect x="60" y="41" width="32" height="3.5" rx="1.75" fill="white" opacity="0.5"/>

  <!-- Row 2 - checked -->
  <rect x="38" y="57" width="14" height="14" rx="4" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <rect x="38" y="57" width="14" height="14" rx="4" fill="white" opacity="0.95"/>
  <polyline points="41,64 44,67 51,61" fill="none" stroke="#8B0000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line -->
  <rect x="60" y="62" width="26" height="3.5" rx="1.75" fill="white" opacity="0.5"/>

  <!-- Row 3 - unchecked, accent -->
  <rect x="38" y="78" width="14" height="14" rx="4" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
  <!-- Line full -->
  <rect x="60" y="83" width="30" height="3.5" rx="1.75" fill="white" opacity="0.9"/>

  <!-- Small overdue pill on row 3 -->
  <rect x="60" y="91" width="22" height="6" rx="3" fill="white" opacity="0.25"/>
</svg>
