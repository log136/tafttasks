<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           width: 300px; padding: 20px; background: #f0f2f5; color: #1a1a2e; }
    h1 { font-size: 1.1rem; font-weight: 800; color: #8B0000; margin-bottom: 4px; }
    .sub { font-size: 0.75rem; color: #6b7280; margin-bottom: 16px; }
    .card { background: white; border-radius: 10px; padding: 14px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; }
    .field input { width: 100%; padding: 7px 10px; border: 1.5px solid #e5e7eb;
                   border-radius: 6px; font-size: 0.85rem; outline: none; }
    .field input:focus { border-color: #8B0000; }
    .btn { width: 100%; padding: 10px; background: #8B0000; color: white;
           border: none; border-radius: 7px; font-size: 0.9rem; font-weight: 700;
           cursor: pointer; margin-top: 4px; transition: background 0.15s; }
    .btn:hover:not(:disabled) { background: #a52020; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .status { font-size: 0.78rem; color: #1d4ed8; margin-top: 8px; min-height: 18px; }
    .error { color: #dc2626; }
    .user-line { font-size: 0.72rem; color: #6b7280; margin-top: 10px; text-align: center; }
    .not-canvas { font-size: 0.85rem; color: #6b7280; padding: 8px 0 0; line-height: 1.5; }
    #loginSection, #notCanvasSection, #courseSelectSection { display: none; }
    .course-item { display: flex; align-items: center; gap: 8px; padding: 6px 0;
                   font-size: 0.82rem; cursor: pointer; }
    .course-item input[type="checkbox"] { accent-color: #8B0000; width: 16px; height: 16px; flex-shrink: 0; }
    .course-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .course-item-badge { font-size: 0.68rem; color: #6b7280; white-space: nowrap; }
    #courseCheckList { max-height: 240px; overflow-y: auto; margin: 8px 0; }
  </style>
</head>
<body>
  <h1><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 128 128" style="vertical-align:middle;margin-right:6px"><rect width="128" height="128" rx="30" fill="#8B0000"/><rect x="28" y="32" width="18" height="18" rx="5" fill="#fff"/><polyline points="32.5,41 36.5,45.5 44,36" fill="none" stroke="#8B0000" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/><rect x="56" y="39" width="42" height="4.5" rx="2.25" fill="#fff" opacity=".5"/><rect x="28" y="56" width="18" height="18" rx="5" fill="#fff"/><polyline points="32.5,65 36.5,69.5 44,60" fill="none" stroke="#8B0000" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/><rect x="56" y="63" width="34" height="4.5" rx="2.25" fill="#fff" opacity=".5"/><rect x="28" y="80" width="18" height="18" rx="5" fill="none" stroke="#fff" stroke-width="2.8"/><rect x="56" y="87" width="38" height="4.5" rx="2.25" fill="#fff" opacity=".9"/><circle cx="100" cy="89" r="4" fill="#FF6B6B" opacity=".9"/></svg>TaftTasks</h1>
  <p class="sub">Canvas Assignment Importer</p>

  <!-- Login -->
  <div id="loginSection" class="card">
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@taftschool.edu">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword">
    </div>
    <button class="btn" id="loginBtn">Sign In</button>
    <div class="status" id="loginStatus"></div>
  </div>

  <!-- Full Sync -->
  <div id="notCanvasSection" class="card">
    <button class="btn" id="syncAllBtn">Find Courses</button>
    <div class="status" id="syncAllStatus"></div>
    <div class="user-line" id="userLine2"></div>
  </div>

  <!-- Course Selection -->
  <div id="courseSelectSection" class="card">
    <div style="font-size:0.82rem; font-weight:600; margin-bottom:4px;">Select courses to scrape:</div>
    <div id="courseCheckList"></div>
    <button class="btn" id="scrapeSelectedBtn">Scrape Selected</button>
    <div class="status" id="scrapeStatus"></div>
  </div>

  <!-- Refresh existing courses -->
  <div id="refreshSection" class="card" style="display:none; margin-top:8px;">
    <button class="btn" id="refreshBtn" style="background:#065f46;">↻ Refresh All Courses</button>
    <div class="status" id="refreshStatus"></div>
  </div>

  <script src="supabase.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
