<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C02020"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <linearGradient id="iconShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════ -->
  <!--  ICON: Rounded square with tasks  -->
  <!-- ══════════════════════════════════ -->
  <g transform="translate(8, 4)">
    <rect width="112" height="112" rx="26" fill="url(#iconBg)"/>
    <rect width="112" height="56" rx="26" fill="url(#iconShine)"/>

    <!-- Row 1 – checked -->
    <rect x="24" y="28" width="16" height="16" rx="4.5" fill="white"/>
    <polyline points="28,36 32,40 39,31" fill="none" stroke="#8B0000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="48" y="34" width="38" height="4" rx="2" fill="white" opacity="0.5"/>

    <!-- Row 2 – checked -->
    <rect x="24" y="50" width="16" height="16" rx="4.5" fill="white"/>
    <polyline points="28,58 32,62 39,53" fill="none" stroke="#8B0000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="48" y="56" width="30" height="4" rx="2" fill="white" opacity="0.5"/>

    <!-- Row 3 – unchecked, bright -->
    <rect x="24" y="72" width="16" height="16" rx="4.5" fill="none" stroke="white" stroke-width="2.5"/>
    <rect x="48" y="78" width="34" height="4" rx="2" fill="white" opacity="0.9"/>
    <circle cx="88" cy="80" r="3.5" fill="#FF6B6B" opacity="0.9"/>
  </g>

  <!-- ══════════════════════════════════ -->
  <!--  WORDMARK (light text for dark)   -->
  <!-- ══════════════════════════════════ -->
  <g transform="translate(138, 0)">
    <text x="0" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="68" font-weight="900" letter-spacing="-2" fill="#e8eaf0">Taft</text>

    <text x="130" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="68" font-weight="900" letter-spacing="-2" fill="#C02020">Tasks</text>

    <text x="2" y="102" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="14.5" font-weight="600" letter-spacing="3.5" fill="#6b7280">
      ASSIGNMENT DASHBOARD</text>
  </g>
</svg>
