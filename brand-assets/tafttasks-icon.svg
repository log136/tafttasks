<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A01010"/>
      <stop offset="100%" stop-color="#700000"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="30" fill="url(#bg)"/>
  <rect width="128" height="64" rx="30" fill="url(#shine)"/>

  <!-- Row 1 – checked -->
  <rect x="28" y="32" width="18" height="18" rx="5" fill="white"/>
  <polyline points="32.5,41 36.5,45.5 44,36" fill="none" stroke="#8B0000" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="56" y="39" width="42" height="4.5" rx="2.25" fill="white" opacity="0.5"/>

  <!-- Row 2 – checked -->
  <rect x="28" y="56" width="18" height="18" rx="5" fill="white"/>
  <polyline points="32.5,65 36.5,69.5 44,60" fill="none" stroke="#8B0000" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="56" y="63" width="34" height="4.5" rx="2.25" fill="white" opacity="0.5"/>

  <!-- Row 3 – unchecked (active task) -->
  <rect x="28" y="80" width="18" height="18" rx="5" fill="none" stroke="white" stroke-width="2.8"/>
  <rect x="56" y="87" width="38" height="4.5" rx="2.25" fill="white" opacity="0.9"/>
  <!-- Urgency dot -->
  <circle cx="100" cy="89" r="4" fill="#FF6B6B" opacity="0.9"/>
</svg>
